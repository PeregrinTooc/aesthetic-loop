networks:
  aesthetic_net:

volumes:
  ollama_models:

services:
  bob:
    image: ollama/ollama:rocm
    networks: [aesthetic_net]
    volumes:
      - ollama_models:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
    restart: unless-stopped

  alice:
    image: ollama/ollama:rocm
    networks: [aesthetic_net]
    volumes:
      - ollama_models:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
    restart: unless-stopped

  dylan:
    image: ollama/ollama:rocm
    networks: [aesthetic_net]
    volumes:
      - ollama_models:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama
    networks: [aesthetic_net]
    volumes:
      - ollama_models:/root/.ollama
    depends_on:
      - bob
    environment:
      - OLLAMA_HOST=http://bob:11434
      - BOB_MODEL=${BOB_MODEL:-gemma3:12b}
      - ALICE_MODEL=${ALICE_MODEL:-mistral-small3.1:latest}
      - DYLAN_MODEL=${DYLAN_MODEL:-qwen2.5vl:3b}
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        until ollama list > /dev/null 2>&1; do sleep 2; done &&
        echo 'Pulling Bob model: '$$BOB_MODEL &&
        ollama pull $$BOB_MODEL &&
        echo 'Pulling Alice model: '$$ALICE_MODEL &&
        ollama pull $$ALICE_MODEL &&
        echo 'Pulling Dylan model: '$$DYLAN_MODEL &&
        ollama pull $$DYLAN_MODEL &&
        echo 'All models ready.'
      "
    restart: "no"

  orchestrator:
    build: ./orchestrator
    networks: [aesthetic_net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./output:/output
      - ./workflow.json:/workflow.json:ro
    restart: "no"
